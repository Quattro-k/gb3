<!DOCTYPE html>  
  
<html lang="ja">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">  
<title>GB3 パーツナビ</title>  
<meta name="apple-mobile-web-app-capable" content="yes">  
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">  
<meta name="apple-mobile-web-app-title" content="GB3ナビ">  
<meta name="theme-color" content="#0b0e17">  
<link rel="manifest" id="manifest-link">  
<link rel="apple-touch-icon" id="apple-icon">  
<style>  
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}  
:root{--bg:#0b0e17;--s1:#131825;--s2:#1a2030;--bd:#1e2d45;--ac:#00d4ff;--ac2:#ff6b35;--gold:#ffc940;--grn:#3dffaa;--dlc:#c084fc;--dim:#4a6080;--txt:#c8dcf0}  
body{background:var(--bg);color:var(--txt);font-family:'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif;min-height:100vh}  
.app{max-width:500px;margin:0 auto}  
header{background:linear-gradient(135deg,#0b0e17,#0d1928);border-bottom:1px solid var(--bd);padding:12px 16px;position:sticky;top:0;z-index:50;box-shadow:0 2px 16px rgba(0,212,255,.08)}  
.h-inner{display:flex;align-items:center;gap:10px}  
.h-hex{width:34px;height:34px;background:linear-gradient(135deg,var(--ac),#0050ff);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}  
.h-title{font-family:monospace;font-size:14px;font-weight:900;color:var(--ac);letter-spacing:2px;text-shadow:0 0 10px rgba(0,212,255,.5)}  
.h-sub{font-size:9px;color:var(--dim);letter-spacing:3px;margin-top:1px}  
/* MODE TABS */  
.mode-tabs{display:flex;border-bottom:1px solid var(--bd);margin-top:10px}  
.mode-tab{flex:1;padding:7px 4px;text-align:center;font-size:11px;font-weight:700;font-family:inherit;color:var(--dim);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s}  
.mode-tab.on{color:var(--ac);border-bottom-color:var(--ac)}  
/* BODY */  
.body{padding:14px 14px 60px}  
.steps{display:flex;gap:4px;margin-bottom:14px}  
.step{flex:1;height:3px;border-radius:2px;background:var(--bd);transition:background .3s}  
.step.done{background:var(--ac)}  
.step.active{background:var(--ac2)}  
.bc{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--dim);margin-bottom:12px;flex-wrap:wrap}  
.bc-link{cursor:pointer;text-decoration:underline;color:var(--dim)}  
.bc-now{color:var(--ac);font-weight:700}  
.bc-sep{color:var(--bd)}  
.sec-lbl{font-size:10px;letter-spacing:3px;color:var(--dim);display:flex;align-items:center;gap:8px;margin-bottom:10px}  
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--bd)}  
/* SEARCH */  
.search-wrap{position:relative;margin-bottom:10px}  
.search-input{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--txt);font-family:inherit;font-size:15px;padding:11px 40px 11px 14px;outline:none;transition:border .2s}  
.search-input:focus{border-color:var(--ac)}  
.search-input::placeholder{color:var(--dim)}  
.search-ico{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--dim);pointer-events:none}  
/* ROW FILTER */  
.tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}  
.tab{padding:5px 10px;border-radius:16px;border:1px solid var(--bd);background:var(--s1);color:var(--dim);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}  
.tab.on{background:rgba(0,212,255,.1);border-color:var(--ac);color:var(--ac);font-weight:700}  
/* GRID */  
.grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}  
.card{background:var(--s1);border:1px solid var(--bd);border-radius:9px;padding:11px;cursor:pointer;transition:all .15s}  
.card:active{background:rgba(0,212,255,.07);border-color:var(--ac);transform:scale(.98)}  
.card-name{font-size:12px;font-weight:700;line-height:1.4}  
.card-sub{font-size:10px;color:var(--dim);margin-top:2px}  
.card-dlc{font-size:9px;color:var(--dlc);margin-top:2px}  
.no-result{text-align:center;padding:40px 20px;color:var(--dim);font-size:13px;grid-column:1/-1}  
/* SEL BOX */  
.sel-box{background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.25);border-radius:10px;padding:12px 14px;margin-bottom:14px}  
.sel-lbl{font-size:9px;letter-spacing:2px;color:var(--dim);margin-bottom:3px}  
.sel-name{font-size:16px;font-weight:700;color:var(--ac);line-height:1.3}  
/* PART GRID */  
.part-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}  
.part-btn{background:var(--s1);border:1px solid var(--bd);border-radius:9px;padding:12px 6px;cursor:pointer;text-align:center;color:var(--txt);font-family:inherit;transition:all .15s}  
.part-btn.no-data{opacity:.35;cursor:default;border-style:dashed}  
.part-btn:not(.no-data):active{background:rgba(255,107,53,.1);border-color:var(--ac2)}  
.part-ico{font-size:20px;display:block;margin-bottom:4px}  
.part-lbl{font-size:11px;font-weight:700}  
.part-note{font-size:9px;color:var(--dim);margin-top:2px}  
/* BACK BTN */  
.back-btn{display:flex;align-items:center;gap:7px;background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:9px 13px;color:var(--txt);font-size:13px;cursor:pointer;font-family:inherit;margin-bottom:14px;transition:border .2s;width:100%;text-align:left}  
.back-btn:active{border-color:var(--ac)}  
/* RESULT */  
.result-card{background:var(--s1);border-radius:11px;padding:15px;margin-bottom:11px}  
.result-card.ac-border{border:1px solid rgba(0,212,255,.35)}  
.result-card.gold-border{border:1px solid rgba(255,201,64,.35)}  
.r-title{font-size:13px;font-weight:700;color:var(--ac);margin-bottom:11px;padding-bottom:9px;border-bottom:1px solid var(--bd)}  
.r-title.gold{color:var(--gold)}  
.r-sec{font-size:9px;letter-spacing:2px;color:var(--dim);margin:12px 0 7px}  
.r-sec:first-child{margin-top:0}  
.tag{display:inline-flex;align-items:center;gap:4px;border-radius:5px;padding:5px 9px;font-size:11px;margin:3px;border:1px solid}  
.tag-shop{background:rgba(61,255,170,.08);border-color:rgba(61,255,170,.4);color:var(--grn)}  
.tag-derive{background:rgba(255,201,64,.08);border-color:rgba(255,201,64,.4);color:var(--gold)}  
.tag-drop{background:rgba(0,212,255,.08);border-color:rgba(0,212,255,.4);color:var(--ac)}  
.tag-dlc{background:rgba(192,132,252,.08);border-color:rgba(192,132,252,.4);color:var(--dlc)}  
.derive-box{background:var(--s2);border:1px solid var(--bd);border-radius:7px;overflow:hidden}  
.d-row{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;border-bottom:1px solid var(--bd)}  
.d-row:last-child{border-bottom:none}  
.d-num{background:var(--ac2);color:#000;font-size:10px;font-weight:900;min-width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}  
.d-text{font-size:12px;line-height:1.6}  
.d-from{color:var(--gold);font-weight:700}  
.d-arrow{color:var(--ac2);margin:0 4px}  
.d-to{color:var(--ac);font-weight:700}  
.info-box{background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.15);border-radius:7px;padding:8px 11px;font-size:11px;color:var(--dim);margin-top:7px;line-height:1.7}  
.info-box strong{color:var(--ac)}  
.src-row{margin-bottom:9px}  
.src-name{font-size:12px;font-weight:700;color:var(--gold);margin-bottom:3px}  
/* WEAPON CATEGORY FILTER */  
.cat-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}  
.cat-tab{padding:5px 10px;border-radius:16px;border:1px solid var(--bd);background:var(--s1);color:var(--dim);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}  
.cat-tab.on{background:rgba(255,107,53,.1);border-color:var(--ac2);color:var(--ac2);font-weight:700}  
/* SRC LINK */  
.src-link{display:flex;align-items:center;justify-content:space-between;background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:8px 11px;margin-bottom:6px;cursor:pointer;transition:border .15s}  
.src-link:active{border-color:var(--ac)}  
.src-link-name{font-size:12px;font-weight:700;color:var(--gold)}  
.src-link-tags{display:flex;gap:4px;align-items:center;flex-shrink:0;margin-left:8px}  
.src-link-arr{color:var(--dim);font-size:12px;margin-left:4px}  
/* CRAFT PLAN */  
.plan-fab{position:fixed;bottom:20px;right:20px;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--ac2),#ff4500);border:none;color:#fff;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(255,107,53,.5);z-index:100;display:flex;align-items:center;justify-content:center;transition:transform .15s}  
.plan-fab:active{transform:scale(.92)}  
.plan-badge{position:absolute;top:-3px;right:-3px;background:var(--gold);color:#000;border-radius:50%;width:18px;height:18px;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center}  
.plan-panel{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;flex-direction:column;justify-content:flex-end}  
.plan-sheet{background:var(--s1);border-radius:18px 18px 0 0;max-height:90vh;display:flex;flex-direction:column;padding:0}  
.plan-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px;border-bottom:1px solid var(--bd)}  
.plan-title{font-size:14px;font-weight:900;color:var(--ac2);letter-spacing:1px}  
.plan-close{background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;padding:4px}  
.plan-body{overflow-y:auto;padding:12px 16px 20px;flex:1}  
.plan-empty{text-align:center;padding:30px;color:var(--dim);font-size:13px}  
/* CRAFT ITEM */  
.craft-goal{background:var(--s2);border:1px solid rgba(255,107,53,.3);border-radius:10px;margin-bottom:12px;overflow:hidden}  
.craft-goal-header{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--bd)}  
.craft-goal-name{flex:1;font-size:13px;font-weight:700;color:var(--ac2)}  
.craft-goal-del{background:none;border:none;color:var(--dim);font-size:16px;cursor:pointer;padding:2px 6px}  
.craft-tree{padding:6px 0}  
.craft-node{display:flex;align-items:flex-start;gap:8px;padding:6px 12px;border-bottom:1px solid rgba(255,255,255,.03)}  
.craft-node:last-child{border-bottom:none}  
.craft-node.depth-1{padding-left:24px}  
.craft-node.depth-2{padding-left:38px}  
.craft-node.done .craft-node-name{color:var(--dim);text-decoration:line-through}  
.craft-check{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--dim);background:none;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px;font-size:10px;color:transparent}  
.craft-check.checked{background:var(--grn);border-color:var(--grn);color:#000}  
.craft-node-body{flex:1}  
.craft-node-name{font-size:12px;font-weight:700;line-height:1.4}  
.craft-node-how{font-size:10px;color:var(--dim);margin-top:2px}  
.craft-node-link{font-size:10px;color:var(--ac);text-decoration:underline;cursor:pointer;margin-top:2px;display:inline-block}  
.craft-progress{height:3px;background:var(--bd);border-radius:2px;margin:0 12px 8px}  
.craft-progress-bar{height:100%;background:var(--grn);border-radius:2px;transition:width .3s}  
/* ADD TO PLAN BTN */  
.add-plan-btn{display:flex;align-items:center;gap:6px;width:100%;background:rgba(255,107,53,.08);border:1px dashed rgba(255,107,53,.4);border-radius:8px;padding:9px 13px;color:var(--ac2);font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:10px;justify-content:center;transition:all .15s}  
.add-plan-btn:active{background:rgba(255,107,53,.18)}  
</style>  
</head>  
<body>  
<div class="app">  
<header>  
  <div class="h-inner">  
    <div class="h-hex">⚙</div>  
    <div>  
      <div class="h-title">GUNDAM BREAKER 3</div>  
      <div class="h-sub">PARTS NAVIGATOR</div>  
    </div>  
  </div>  
  <div class="mode-tabs">  
    <button class="mode-tab on" id="mt-gunpla" onclick="switchMode('gunpla')">🤖 機体パーツ</button>  
    <button class="mode-tab" id="mt-melee" onclick="switchMode('melee')">⚔️ 近接武器</button>  
    <button class="mode-tab" id="mt-shoot" onclick="switchMode('shoot')">🔫 射撃武器</button>  
    <button class="mode-tab" id="mt-shield" onclick="switchMode('shield')">🛡 シールド</button>  
  </div>  
</header>  
<div class="body">  
  <div class="bc" id="bc"></div>  
  <div class="steps" id="steps-wrap" style="display:none">  
    <div class="step" id="st1"></div>  
    <div class="step" id="st2"></div>  
    <div class="step" id="st3"></div>  
  </div>  
  
  <!-- ===== 機体モード ===== -->  
  
  <div id="pg-gunpla">  
    <div class="sec-lbl">作りたい機体を選ぶ</div>  
    <div class="search-wrap">  
      <input class="search-input" id="g-search" type="search" placeholder="機体名で検索..." oninput="renderGGrid()">  
      <span class="search-ico">🔍</span>  
    </div>  
    <div class="tabs" id="g-tabs"></div>  
    <div class="grid" id="g-grid"></div>  
  </div>  
  <div id="pg-part" style="display:none">  
    <button class="back-btn" onclick="goTo('gunpla')">← 機体選択に戻る</button>  
    <div class="sel-box"><div class="sel-lbl">選択中の機体</div><div class="sel-name" id="sel-gname"></div></div>  
    <div class="sec-lbl">部位を選ぶ</div>  
    <div class="part-grid" id="part-grid"></div>  
  </div>  
  <div id="pg-gresult" style="display:none">  
    <button class="back-btn" onclick="goTo('part')">← 部位選択に戻る</button>  
    <div id="g-result"></div>  
  </div>  
  
  <!-- ===== 武器/シールドモード ===== -->  
  
  <div id="pg-weapons" style="display:none">  
    <div class="sec-lbl" id="w-sec-lbl">武器を選ぶ</div>  
    <div class="search-wrap">  
      <input class="search-input" id="w-search" type="search" placeholder="武器名・機体名で検索..." oninput="renderWGrid()">  
      <span class="search-ico">🔍</span>  
    </div>  
    <div class="cat-tabs" id="w-cats"></div>  
    <div class="grid" id="w-grid"></div>  
  </div>  
  <div id="pg-wresult" style="display:none">  
    <button class="back-btn" id="w-back-btn" onclick="goTo('weapons')">← 一覧に戻る</button>  
    <div id="w-result"></div>  
  </div>  
</div>  
  
<!-- クラフトプランFAB -->  
  
<button class="plan-fab" onclick="openPlan()" id="plan-fab" title="クラフトプラン">  
  📋<span class="plan-badge" id="plan-badge" style="display:none">0</span>  
</button>  
  
<!-- クラフトプランパネル -->  
  
<div class="plan-panel" id="plan-panel" style="display:none" onclick="closePlanOutside(event)">  
  <div class="plan-sheet" id="plan-sheet">  
    <div class="plan-header">  
      <div class="plan-title">📋 クラフトプラン</div>  
      <button class="plan-close" onclick="closePlan()">✕</button>  
    </div>  
    <div class="plan-body" id="plan-body"></div>  
  </div>  
</div>  
</div>  
  
<script>  
// =============================================  
// 機体データ  
// d は派生合成レシピ配列。各レシピは配列で「必要な派生元機体名」のリスト。  
// 部位指定がある場合は名前に「（ヘッド）」等を含める。  
// parts: 派生合成で作れる部位リスト。指定なしの行は全部位OKとみなす。  
// partsSpec: 特定部位のみ派生元が指定されているレシピ (部位→レシピ配列)  
//  
// 設計方針：  
//   - サイトに部位指定が"ない"レシピ → 全部位 (HEAD/BODY/ARM/LEG/BACK) に適用  
//   - サイトに（ヘッド）等部位指定がある → その部位のみに適用  
//   - DLC機体で派生元なし → 全部位DLC扱い  
// =============================================  
var PARTS_ALL = ['HEAD','BODY','ARM','LEG','BACK'];  
  
// partsSpecの構造:  
// { HEAD: [['派生元A','派生元B'], ...], BACK: [...] }  
// dは「全部位共通」のレシピ (部位指定なし行)  
  
var GD = [  
// ア行  
{n:'アカツキ',r:'ア',d:[['ストライクルージュ','フリーダムガンダム']]},  
{n:'アカツキ（オオワシ装備）',r:'ア',ps:{BACK:[['ストライクルージュ+I.W.S.P.（バックパック）','フリーダムガンダム（バックパック）']]}},  
{n:'アカツキ（シラヌイ装備）',r:'ア',ps:{BACK:[['ストライクルージュ+I.W.S.P.（バックパック）']]}},  
{n:'アストレイグリーンフレーム',r:'ア',d:[['アストレイブルーフレーム','アストレイレッドフレーム']]},  
{n:'アストレイゴールドフレーム天',r:'ア',d:[['アストレイレッドフレーム','アストレイブルーフレームセカンドリバイ']]},  
{n:'アストレイゴールドフレーム天ミナ',r:'ア',ps:{ARM:[['アストレイゴールドフレーム天（アーム）','アストレイブルーフレームセカンドリバイ（アーム）']],LEG:[['アストレイゴールドフレーム天（レッグ）','アストレイブルーフレームセカンドリバイ（レッグ）']]}},  
{n:'アストレイブルーフレーム',r:'ア',d:[['アストレイレッドフレーム','ガンダムエクシア']]},  
{n:'アストレイブルーフレームセカンドリバイ',r:'ア',d:[['アストレイブルーフレーム','アストレイレッドフレーム']]},  
{n:'アストレイレッドフレーム',r:'ア',d:[['ガンダムEz8','陸戦型ガンダム']]},  
{n:'アストレイレッドフレーム改',r:'ア',ps:{LEG:[['アストレイレッドフレーム（レッグ）','アストレイゴールドフレーム天（レッグ）']],BACK:[['アストレイレッドフレーム（バックパック）','アストレイゴールドフレーム天（バックパック）']]}},  
{n:'アストレイレッドドラゴン',r:'ア',ps:{HEAD:[['アストレイブルーフレームセカンドリバイ（ヘッド）','アストレイレッドフレーム（ヘッド）']],BACK:[['アストレイブルーフレームセカンドリバイ（バックパック）','アストレイレッドフレーム改（バックパック）']]}},  
{n:'アストレイレッドフレーム（フライトユニット装備）',r:'ア',ps:{BACK:[['アストレイレッドフレーム（バックパック）','アストレイブルーフレーム（バックパック）']]}},  
{n:'アッガイ',r:'ア',ps:{HEAD:[['ザクⅡ（ヘッド）']],BODY:[['ザクⅡS','ズゴック']],ARM:[['ザクⅡS','ズゴック']],LEG:[['ザクⅡS','ズゴック']],BACK:[['ザクⅡS','ズゴック']]}},  
{n:'アルケーガンダム',r:'ア',dlc:1},  
{n:'アルトロンガンダム',r:'ア',d:[['ガンダムエピオン','シェンロンガンダム（EW版）']]},  
{n:'Ex-Sガンダム',r:'ア',d:[['Sガンダム','ファッツ']]},  
{n:'イージスガンダム',r:'ア',dlc:1},  
{n:'インパルスガンダム',r:'ア',d:[['ガンダムエクシア','ストライクガンダム']]},  
{n:'インフィニットジャスティスガンダム',r:'ア',ps:{ARM:[['ジャスティスガンダム（アーム）','フリーダムガンダム']],BACK:[['ジャスティスガンダム（バックパック）','フリーダムガンダム']],HEAD:[['ジャスティスガンダム','フリーダムガンダム']],BODY:[['ジャスティスガンダム','フリーダムガンダム']],LEG:[['ジャスティスガンダム','フリーダムガンダム']]}},  
{n:'ヴィクトリーガンダム',r:'ア',d:[['ガンダム','ジム']]},  
{n:'Vガンダムヘキサ',r:'ア',ps:{HEAD:[['ヴィクトリーガンダム（ヘッド）','ガンダムMk-Ⅱエゥーゴ仕様（ヘッド）']]}},

// ロジック  
// =============================================  
var PART_DEFS=[{k:'HEAD',l:'ヘッド',i:'🪖'},{k:'BODY',l:'ボディ',i:'🛡'},{k:'ARM',l:'アーム',i:'💪'},{k:'LEG',l:'レッグ',i:'🦵'},{k:'BACK',l:'バックパック',i:'🎒'}];  
var ROWS=['すべて','ア','カ','サ','タ','ナ','ハ','マ','ヤ','ラ'];  
var curMode='gunpla',curPage='gunpla',selG=null,selP=null;  
var curRow='すべて',curWCat='すべて';  
  
function $$(id){return document.getElementById(id)}  
  
// 機体の特定部位に対するレシピを取得  
function getRecipes(g, partKey){  
  var recipes=[];  
  // 全部位共通レシピ  
  if(g.d && g.d.length) recipes=recipes.concat(g.d);  
  // 部位別レシピ  
  if(g.ps && g.ps[partKey]) recipes=recipes.concat(g.ps[partKey]);  
  return recipes;  
}  
  
// 部位にデータがあるか  
function hasPartData(g, partKey){  
  if(g.dlc) return true;  
  if(g.shop) return true;  
  if(g.d && g.d.length) return true;  
  if(g.ps && g.ps[partKey] && g.ps[partKey].length) return true;  
  return false;  
}  
  
function switchMode(mode){  
  curMode=mode;  
  ['gunpla','melee','shoot','shield'].forEach(function(m){  
    $$('mt-'+m).classList[m===mode?'add':'remove']('on');  
  });  
  if(mode==='gunpla'){  
    curPage='gunpla'; selG=null; selP=null;  
    $$('pg-gunpla').style.display=''; $$('pg-part').style.display='none'; $$('pg-gresult').style.display='none';  
    $$('pg-weapons').style.display='none'; $$('pg-wresult').style.display='none';  
    $$('steps-wrap').style.display='';  
    initGMode();  
  } else {  
    curPage='weapons';  
    $$('pg-gunpla').style.display='none'; $$('pg-part').style.display='none'; $$('pg-gresult').style.display='none';  
    $$('pg-weapons').style.display=''; $$('pg-wresult').style.display='none';  
    $$('steps-wrap').style.display='none';  
    initWMode(mode);  
  }  
  updateBC();  
}  
  
function initGMode(){  
  var tabs=$$('g-tabs');  
  tabs.innerHTML=ROWS.map(function(r){return'<button class="tab'+(r===curRow?' on':'')+'" onclick="setGRow(\''+r+'\',this)">'+r+'</button>';}).join('');  
  renderGGrid();  
}  
  
function setGRow(r,btn){  
  curRow=r;  
  document.querySelectorAll('#g-tabs .tab').forEach(function(t){t.classList.remove('on');});  
  btn.classList.add('on'); renderGGrid();  
}  
  
function renderGGrid(){  
  var q=$$('g-search').value;  
  var filtered=GD.filter(function(g){return(!q||g.n.indexOf(q)>=0)&&(curRow==='すべて'||g.r===curRow);});  
  if(!filtered.length){$$('g-grid').innerHTML='<div class="no-result">🤖 見つかりません</div>';return;}  
  $$('g-grid').innerHTML=filtered.map(function(g){  
    return'<div class="card" onclick="selGunpla(\''+esc(g.n)+'\')"><div class="card-name">'+g.n+'</div>'+(g.dlc?'<div class="card-dlc">💎 DLC</div>':'')+'</div>';  
  }).join('');  
}  
  
function selGunpla(name){  
  selG=GD.find(function(g){return g.n===name;});  
  if(!selG) return;  
  curPage='part'; $$('sel-gname').textContent=selG.n;  
  $$('part-grid').innerHTML=PART_DEFS.map(function(p){  
    var has=hasPartData(selG,p.k);  
    return'<button class="part-btn'+(has?'':' no-data')+'"'+(has?' onclick="selPart(\''+p.k+'\')"':'')+'>'+  
      '<span class="part-ico">'+p.i+'</span><div class="part-lbl">'+p.l+'</div>'+  
      (has?'':'<div class="part-note">データなし</div>')+  
    '</button>';  
  }).join('');  
  $$('pg-gunpla').style.display='none'; $$('pg-part').style.display=''; $$('pg-gresult').style.display='none';  
  updateSteps(2); updateBC(); window.scrollTo(0,0);  
}  
  
function selPart(pk){  
  selP=pk; curPage='gresult';  
  $$('pg-part').style.display='none'; $$('pg-gresult').style.display='';  
  renderGResult(); updateSteps(3); updateBC(); window.scrollTo(0,0);  
}  
  
function goTo(pg){  
  if(pg==='gunpla'){  
    curPage='gunpla'; selG=null; selP=null;  
    $$('pg-gunpla').style.display=''; $$('pg-part').style.display='none'; $$('pg-gresult').style.display='none';  
    updateSteps(1);  
  } else if(pg==='part'){  
    curPage='part';  
    $$('pg-part').style.display=''; $$('pg-gresult').style.display='none';  
    updateSteps(2);  
  } else if(pg==='weapons'){  
    curPage='weapons';  
    $$('pg-weapons').style.display=''; $$('pg-wresult').style.display='none';  
  }  
  updateBC(); window.scrollTo(0,0);  
}  
  
function renderGResult(){  
  var g=selG, pd=PART_DEFS.find(function(p){return p.k===selP;});  
  var recipes=getRecipes(g,selP);  
  var planKey='gunpla:'+g.n+':'+selP;  
  var html='<div class="result-card ac-border"><div class="r-title">'+pd.i+' '+g.n+' &mdash; '+pd.l+'</div>';  
  if(g.dlc){  
    html+='<span class="tag tag-dlc">💎 DLC必須パックで入手</span>';  
  } else {  
    if(g.shop) html+='<div class="r-sec">🏪 ショップ購入</div><span class="tag tag-shop">🏪 ショップで購入可能</span>';  
    if(recipes.length){  
      html+='<div class="r-sec">⚗️ 派生合成</div><div class="derive-box">';  
      recipes.forEach(function(from,i){  
        html+='<div class="d-row"><div class="d-num">'+(i+1)+'</div><div class="d-text"><span class="d-from">'+  
          from.map(function(src){return renderSrcChip(src,'gunpla');}).join('<span style="color:var(--ac2);margin:0 3px">＋</span>')+  
        '</span><span class="d-arrow">→</span><span class="d-to">'+g.n+' '+pd.l+'</span></div></div>';  
      });  
      html+='</div>';  
    }  
    if(!g.shop && !recipes.length){  
      html+='<span class="tag tag-drop">🎯 ミッションドロップ</span>';  
      html+='<div class="info-box"><strong>ヒント：</strong>ミッションでドロップするか、バウンティハンターモードで入手してください</div>';  
    }  
    if(g.shop && !recipes.length){  
      html+='<div class="info-box"><strong>ヒント：</strong>同部位のパーツを集めるとショップに並びます</div>';  
    }  
  }  
  html+='<button class="add-plan-btn" onclick="addToPlan(\''+esc(planKey)+'\',this)">＋ クラフトプランに追加</button>';  
  html+='</div>';  
  $$('g-result').innerHTML=html;  
}  
  
// 派生元名をリンク付きチップとして描画  
function renderSrcChip(src, mode){  
  var baseName=src.replace(/（[^）]*）/g,'').replace(/※.*/,'').trim();  
  var partHint=src.match(/（([^）]+)）/);  
  var partLabel=partHint?partHint[1]:'';  
  // 機体か武器か検索  
  var sg=GD.find(function(g){return g.n===baseName||src.startsWith(g.n);});  
  var sw=null;  
  if(!sg && mode!=='gunpla'){  
    var wdata=WD[mode]||[];  
    sw=wdata.find(function(w){return w.n===baseName||src.startsWith(w.n);});  
  }  
  // 武器モードでも全カテゴリ検索  
  if(!sg && !sw){  
    ['melee','shoot','shield'].forEach(function(m){  
      if(sw) return;  
      sw=(WD[m]||[]).find(function(w){return w.n===baseName||src.startsWith(w.n);});  
      if(sw) sw._mode=m;  
    });  
  }  
  var hasLink=sg||sw;  
  var onClick='';  
  if(sg) onClick='onclick="navToGunpla(\''+esc(sg.n)+'\')"';  
  else if(sw) onClick='onclick="navToWeapon(\''+esc(sw.n)+'\',\''+(sw._mode||mode)+'\')"';  
  
  var tagHtml='';  
  if(sg){  
    if(sg.dlc) tagHtml='<span class="tag tag-dlc" style="padding:2px 6px;font-size:10px">DLC</span>';  
    else if(sg.shop) tagHtml='<span class="tag tag-shop" style="padding:2px 6px;font-size:10px">ショップ</span>';  
    else tagHtml='<span class="tag tag-derive" style="padding:2px 6px;font-size:10px">派生</span>';  
  } else if(sw){  
    if(sw.dlc) tagHtml='<span class="tag tag-dlc" style="padding:2px 6px;font-size:10px">DLC</span>';  
    else if(sw.shop) tagHtml='<span class="tag tag-shop" style="padding:2px 6px;font-size:10px">ショップ</span>';  
    else tagHtml='<span class="tag tag-derive" style="padding:2px 6px;font-size:10px">派生</span>';  
  } else {

// ===== クラフトプラン =====  
var craftPlans={}; // key -> {label, checks:{nodeId:bool}}  
var craftChecks={}; // nodeId -> bool  
  
function getPlanLabel(key){  
  var parts=key.split(':');  
  if(parts[0]==='gunpla'){  
    var partLabel=(PART_DEFS.find(function(p){return p.k===parts[2];})||{l:parts[2]}).l;  
    return parts[1]+' '+partLabel;  
  } else {  
    return parts[2];  
  }  
}  
  
// planKey から素材ツリーを構築  
function buildCraftTree(key, depth, visited){  
  depth=depth||0; visited=visited||{};  
  if(visited[key]) return [];  
  visited[key]=true;  
  var parts=key.split(':');  
  var nodes=[];  
  
  if(parts[0]==='gunpla'){  
    var gname=parts[1], pk=parts[2];  
    var g=GD.find(function(x){return x.n===gname;});  
    if(!g) return nodes;  
    // pkがALLの場合は「この機体パーツ全般」として扱う（素材ノード）  
    var recipes= pk==='ALL' ? (g.d||[]) : getRecipes(g,pk);  
    var partLbl= pk==='ALL' ? 'パーツ' : (PART_DEFS.find(function(p){return p.k===pk;})||{l:pk}).l;  
    var label=gname+(pk!=='ALL'?' '+partLbl:'');  
    var how=g.dlc?'DLC':g.shop?'ショップ購入':recipes.length?'派生合成':'ドロップ';  
    nodes.push({id:key,label:label,how:how,depth:depth,type:'gunpla',gname:gname,pk:pk,dlc:!!g.dlc,shop:!!g.shop,hasDerives:recipes.length>0});  
    if(recipes.length && depth<4){  
      var recipe=recipes[0];  
      recipe.forEach(function(src){  
        var baseName=src.replace(/（[^）]*）/g,'').replace(/※.*/,'').trim();  
        var sg=GD.find(function(x){return x.n===baseName||src.startsWith(x.n);});  
        if(sg){  
          var childKey='gunpla:'+sg.n+':ALL';  
          nodes=nodes.concat(buildCraftTree(childKey,depth+1,visited));  
        } else {  
          nodes.push({id:key+'_src_'+src,label:src,how:'ドロップ/ショップ',depth:depth+1,type:'src',leaf:true});  
        }  
      });  
    }  
  
  } else if(parts[0]==='weapon'){  
    var wmode=parts[1],wname=parts[2];  
    var wdata=WD[wmode]||[];  
    var w=wdata.find(function(x){return x.n===wname;});  
    if(!w) return nodes;  
    var how=w.dlc?'DLC':w.shop?'ショップ購入':w.d&&w.d.length?'派生合成':'ドロップ';  
    nodes.push({id:key,label:wname+(w.owner?' ('+w.owner+')':''),how:how,depth:depth,type:'weapon',wmode:wmode,wname:wname,dlc:!!w.dlc,shop:!!w.shop,hasDerives:!!(w.d&&w.d.length)});  
    if(w.d&&w.d.length&&depth<4){  
      var recipe=w.d[0];  
      recipe.forEach(function(src){  
        var sw=null,swmode=wmode;  
        ['melee','shoot','shield'].forEach(function(m){  
          if(sw) return;  
          var f=(WD[m]||[]).find(function(x){return x.n===src;});  
          if(f){sw=f;swmode=m;}  
        });  
        if(sw){  
          nodes=nodes.concat(buildCraftTree('weapon:'+swmode+':'+sw.n,depth+1,visited));  
        } else {  
          nodes.push({id:key+'_src_'+src,label:src,how:'ドロップ/ショップ',depth:depth+1,type:'src',leaf:true});  
        }  
      });  
    }  
  }  
  return nodes;  
}  
  
function addToPlan(key, btnEl){  
  if(!btnEl && window.event) btnEl=window.event.currentTarget||window.event.target;  
  if(craftPlans[key]){  
    if(btnEl){  
      var orig=btnEl.textContent;  
      btnEl.textContent='すでに追加済み';  
      setTimeout(function(){btnEl.textContent=orig;},1200);  
    }  
    return;  
  }  
  craftPlans[key]={label:getPlanLabel(key)};  
  updatePlanBadge();  
  if(btnEl){  
    btnEl.textContent='✓ 追加しました！';  
    btnEl.style.background='rgba(61,255,170,.15)';  
    btnEl.style.borderColor='rgba(61,255,170,.5)';  
    btnEl.style.color='var(--grn)';  
    setTimeout(function(){  
      btnEl.textContent='＋ クラフトプランに追加';  
      btnEl.style.background=''; btnEl.style.borderColor=''; btnEl.style.color='';  
    },1500);  
  }  
}  
  
function updatePlanBadge(){  
  var count=Object.keys(craftPlans).length;  
  var badge=$$('plan-badge');  
  if(count>0){badge.style.display='flex';badge.textContent=count;}  
  else{badge.style.display='none';}

}  
  
function closePlan(){$$('plan-panel').style.display='none';}  
function closePlanOutside(e){if(e.target===$$('plan-panel')) closePlan();}  
  
function renderPlanBody(){  
  var keys=Object.keys(craftPlans);  
  if(!keys.length){  
    $$('plan-body').innerHTML='<div class="plan-empty">📭 まだプランがありません<br><br>パーツ詳細ページの<br>「＋ クラフトプランに追加」で<br>目標を登録できます</div>';  
    return;  
  }  
  var html='';  
  keys.forEach(function(key){  
    var plan=craftPlans[key];  
    var nodes=buildCraftTree(key,0,{});  
    var total=nodes.length;  
    var done=nodes.filter(function(n){return craftChecks[n.id];}).length;  
    var pct=total?Math.round(done/total*100):0;  
  
    html+='<div class="craft-goal">';  
    html+='<div class="craft-goal-header">';  
    html+='<div class="craft-goal-name">🎯 '+plan.label+'</div>';  
    html+='<button class="craft-goal-del" onclick="removePlan(\''+esc(key)+'\')">✕</button>';  
    html+='</div>';  
    // プログレスバー  
    html+='<div class="craft-progress"><div class="craft-progress-bar" style="width:'+pct+'%"></div></div>';  
    html+='<div style="font-size:10px;color:'+(pct===100?'var(--grn)':'var(--dim)')+';padding:2px 12px 8px;text-align:right">'+(pct===100?'✓ 完成！':done+'/'+total+' 完了 ('+pct+'%)')+'</div>';  
  
    html+='<div class="craft-tree">';  
    nodes.forEach(function(node){  
      var checked=!!craftChecks[node.id];  
      var depthClass='depth-'+Math.min(node.depth,2);  
      var doneClass=checked?' done':'';  
      var prefix=node.depth===0?'':'　'.repeat(node.depth)+(node.depth>0?'└ ':'');  
  
      // 詳細リンク  
      var linkHtml='';  
      if(!node.leaf){  
        if(node.type==='gunpla'){  
          var pk2=node.pk==='ALL'?'':(':'+node.pk);  
          linkHtml='<span class="craft-node-link" onclick="closePlan();navToGunpla(\''+esc(node.gname)+'\')">詳細 →</span>';  
        } else if(node.type==='weapon'){  
          linkHtml='<span class="craft-node-link" onclick="closePlan();navToWeapon(\''+esc(node.wname)+'\',\''+node.wmode+'\')">詳細 →</span>';  
        }  
      }  
  
      var howIcon={'DLC':'💎','ショップ購入':'🏪','派生合成':'⚗️','ドロップ':'🎯','ドロップ/ショップ':'🎯'}[node.how]||'🎯';  
      var howColor={'DLC':'var(--dlc)','ショップ購入':'var(--grn)','派生合成':'var(--gold)'}[node.how]||'var(--dim)';  
  
      html+='<div class="craft-node '+depthClass+doneClass+'">';  
      html+='<div class="craft-check'+(checked?' checked':'')+'" onclick="toggleCheck(\''+esc(node.id)+'\')">'+(checked?'✓':'')+'</div>';  
      html+='<div class="craft-node-body">';  
      html+='<div class="craft-node-name">'+(node.depth>0?'<span style="color:var(--dim)">└ </span>':'')+node.label+'</div>';  
      html+='<div class="craft-node-how" style="color:'+howColor+'">'+howIcon+' '+node.how+'</div>';  
      if(linkHtml) html+=linkHtml;  
      html+='</div></div>';  
    });  
    html+='</div></div>';  
  });  
  $$('plan-body').innerHTML=html;  
}  
  
function toggleCheck(nodeId){  
  craftChecks[nodeId]=!craftChecks[nodeId];  
  renderPlanBody();  
}  
  
function removePlan(key){  
  delete craftPlans[key];  
  updatePlanBadge();  
  renderPlanBody();  
}

function initPWA(){  
  // アイコン画像をCanvasで生成  
  var canvas=document.createElement('canvas');  
  canvas.width=512; canvas.height=512;  
  var ctx=canvas.getContext('2d');  
  // 背景  
  var bg=ctx.createLinearGradient(0,0,512,512);  
  bg.addColorStop(0,'#0b0e17');  
  bg.addColorStop(1,'#0d1928');  
  ctx.fillStyle=bg;  
  ctx.beginPath();  
  ctx.roundRect(0,0,512,512,80);  
  ctx.fill();  
  // ヘキサゴン  
  ctx.save();  
  ctx.translate(256,220);  
  ctx.beginPath();  
  var r=110;  
  for(var i=0;i<6;i++){  
    var a=Math.PI/180*(60*i-30);  
    i===0?ctx.moveTo(r*Math.cos(a),r*Math.sin(a)):ctx.lineTo(r*Math.cos(a),r*Math.sin(a));  
  }  
  ctx.closePath();  
  var hg=ctx.createLinearGradient(-r,-r,r,r);  
  hg.addColorStop(0,'#00d4ff');  
  hg.addColorStop(1,'#0050ff');  
  ctx.fillStyle=hg;  
  ctx.fill();  
  // ⚙ アイコン  
  ctx.fillStyle='#fff';  
  ctx.font='bold 100px sans-serif';  
  ctx.textAlign='center';  
  ctx.textBaseline='middle';  
  ctx.fillText('⚙',0,0);  
  ctx.restore();  
  // テキスト  
  ctx.fillStyle='#00d4ff';  
  ctx.font='bold 52px monospace';  
  ctx.textAlign='center';  
  ctx.textBaseline='middle';  
  ctx.fillText('GB3',256,370);  
  ctx.fillStyle='#4a6080';  
  ctx.font='bold 28px monospace';  
  ctx.fillText('PARTS NAV',256,420);  
  
  var iconDataUrl=canvas.toDataURL('image/png');  
  
  // apple-touch-icon  
  var appleIcon=document.getElementById('apple-icon');  
  appleIcon.href=iconDataUrl;  
  
  // manifest をBlobで生成  
  var manifest={  
    name:'GB3 パーツナビ',  
    short_name:'GB3ナビ',  
    description:'ガンダムブレイカー3 パーツ派生合成ナビ',  
    start_url:'.',  
    display:'standalone',  
    background_color:'#0b0e17',  
    theme_color:'#0b0e17',  
    orientation:'portrait',  
    icons:[  
      {src:iconDataUrl,sizes:'512x512',type:'image/png',purpose:'any maskable'}  
    ]  
  };  
  var manifestBlob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});  
  var manifestUrl=URL.createObjectURL(manifestBlob);  
  document.getElementById('manifest-link').href=manifestUrl;  
  
  // iOS Safari向け：インストールガイドを初回表示  
  var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);  
  var isAndroid=/android/i.test(navigator.userAgent);  
  var isStandalone=window.navigator.standalone||window.matchMedia('(display-mode: standalone)').matches;  
  if(!isStandalone && (isIOS||isAndroid) && !sessionStorage.getItem('pwa-hint-shown')){  
    sessionStorage.setItem('pwa-hint-shown','1');  
    setTimeout(function(){showPWAHint(isIOS);},1500);  
  }  
}  
  
function showPWAHint(isIOS){  
  var div=document.createElement('div');  
  div.id='pwa-hint';  
  div.style.cssText='position:fixed;bottom:0;left:0;right:0;z-index:300;background:linear-gradient(to top,#0b0e17,rgba(11,14,23,.95));border-top:1px solid #1e2d45;padding:16px 20px 32px;max-width:500px;margin:0 auto;';  
  div.innerHTML=  
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+  
    '<div style="font-size:13px;font-weight:900;color:#00d4ff">📲 ホーム画面に追加</div>'+  
    '<button onclick="document.getElementById(\'pwa-hint\').remove()" style="background:none;border:none;color:#4a6080;font-size:18px;cursor:pointer;padding:2px 6px">✕</button>'+  
    '</div>'+  
    (isIOS  
      ? '<div style="font-size:12px;color:#c8dcf0;line-height:1.8">'+  
        '① 下の <strong style="color:#00d4ff">共有ボタン</strong>（□↑）をタップ<br>'+  
        '② 「<strong style="color:#00d4ff">ホーム画面に追加</strong>」を選ぶ<br>'+  
        '③ 「<strong style="color:#00d4ff">追加</strong>」でアプリとして起動できます</div>'  
      : '<div style="font-size:12px;color:#c8dcf0;line-height:1.8">'+  
        'ブラウザの <strong style="color:#00d4ff">メニュー（⋮）</strong> から<br>'+  
        '「<strong style="color:#00d4ff">ホーム画面に追加</strong>」を選ぶと<br>'+  
        'アプリとして起動できます</div>')+  
    '<div style="margin-top:10px;padding:8px 12px;background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.2);border-radius:7px;font-size:11px;color:#4a6080">オフラインでも動作します ✓</div>';  
  document.body.appendChild(div);  
  // 5秒後に自動で消える  
  setTimeout(function(){var el=document.getElementById('pwa-hint');if(el) el.remove();},8000);  
}  
</script>  
  
</body>  
</html>
